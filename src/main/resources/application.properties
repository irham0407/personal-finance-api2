spring.application.name=personal-finance-api2
server.port=8080

# 1. KONEKSI MARIADB BERSIH DENGAN NATIVE PASSWORD PLUGIN
spring.datasource.url=jdbc:mariadb://localhost:3306/db_keuangan_pribadi2?createDatabaseIfNotExist=true&authenticationPlugins=org.mariadb.jdbc.plugin.authentication.standard.NativePasswordPlugin
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Jika baris di atas masih membandel, gunakan properti di bawah ini untuk mengunci tipe otentikasinya:
spring.datasource.hikari.data-source-properties.authenticationPlugins=org.mariadb.jdbc.plugin.authentication.standard.NativePasswordPlugin

# 2. JPA & HIBERNATE SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# 3. PERSIAPAN INTEGRASI MAILTRAP (UNTUK MASA DEPAN)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=MASUKKAN_USERNAME_MAILTRAP_ANDA
spring.mail.password=MASUKKAN_PASSWORD_MAILTRAP_ANDA
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true